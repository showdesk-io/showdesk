{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Showdesk Admin — Sign in</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 2rem; width: 100%; max-width: 400px; }
    .logo { width: 48px; height: 48px; background: #6366f1; border-radius: 12px; margin: 0 auto 1rem; }
    h1 { text-align: center; font-size: 1.5rem; color: #111827; margin-bottom: .25rem; }
    .subtitle { text-align: center; font-size: .875rem; color: #6b7280; margin-bottom: 1.5rem; }
    label { display: block; font-size: .875rem; font-weight: 500; color: #374151; margin-bottom: .25rem; }
    input[type="email"], input[type="text"] { width: 100%; padding: .625rem .75rem; border: 1px solid #d1d5db; border-radius: 8px; font-size: .875rem; outline: none; }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,.15); }
    .code-input { text-align: center; font-size: 1.5rem; font-family: monospace; letter-spacing: .5em; }
    button { width: 100%; padding: .625rem; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: .875rem; font-weight: 500; cursor: pointer; margin-top: 1rem; }
    button:hover { background: #4f46e5; }
    .error { background: #fef2f2; color: #991b1b; padding: .5rem .75rem; border-radius: 8px; font-size: .875rem; margin-bottom: 1rem; }
    .hint { font-size: .75rem; color: #9ca3af; margin-top: .5rem; }
    .back { display: inline-block; margin-top: .75rem; font-size: .875rem; color: #6366f1; text-decoration: none; cursor: pointer; background: none; border: none; width: auto; padding: 0; }
    .back:hover { color: #4f46e5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Showdesk Admin</h1>

    {% if step == "code" %}
      <p class="subtitle">Enter the code sent to your email</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="step" value="code">
        <input type="hidden" name="email" value="{{ email }}">

        <label for="code">Login code</label>
        <input type="text" id="code" name="code" inputmode="numeric" autocomplete="one-time-code" maxlength="8" required autofocus class="code-input" placeholder="------">
        <p class="hint">Sent to <strong>{{ email }}</strong></p>

        <button type="submit">Sign in</button>
      </form>

      <form method="post" style="text-align:center">
        {% csrf_token %}
        <input type="hidden" name="step" value="email">
        <input type="hidden" name="email" value="{{ email }}">
        <button type="submit" class="back">Use a different email</button>
      </form>

    {% else %}
      <p class="subtitle">Sign in with your email</p>

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="step" value="email">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autofocus placeholder="admin@company.com" value="{{ email }}">

        <button type="submit">Send login code</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
