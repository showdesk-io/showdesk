{% comment %}Bulletproof CTA button. Vars: url, label.{% endcomment %}
<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:8px 0 4px 0;">
  <tr>
    <td align="center" bgcolor="{{ brand.primary_color }}" style="border-radius:8px;background:{{ brand.primary_color }};">
      <a href="{{ url }}" target="_blank" style="display:inline-block;padding:12px 22px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;font-size:14px;font-weight:600;line-height:20px;color:#FFFFFF;text-decoration:none;border-radius:8px;">{{ label }}</a>
    </td>
  </tr>
</table>
