# =============================================================================
# Showdesk Production Docker Compose
# =============================================================================
# This file is designed for deployment with Portainer.
# Databases (PostgreSQL, Redis) and S3 storage are expected to be managed
# externally (e.g., Scaleway managed services) and configured via environment
# variables. No critical data should reside on non-managed servers.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Caddy (reverse proxy — single entry point, automatic HTTPS)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SHOWDESK_DOMAIN=${SHOWDESK_DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Django Backend (Gunicorn + Uvicorn for WebSockets)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 4
      --timeout 120
      --access-logfile -
      --error-logfile -
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A config worker
      -l warning
      -Q default,video_processing
      --concurrency 4
      --max-tasks-per-child 100
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduler)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat -l warning
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # React Frontend (Nginx serving static build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # LiveKit (optional, self-hosted)
  # ---------------------------------------------------------------------------
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./docker/livekit.yaml:/etc/livekit.yaml
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
