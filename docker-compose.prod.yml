# =============================================================================
# Showdesk Production Docker Compose
# =============================================================================
# Deploy via Portainer as a stack.
#
# Profiles:
#   - (default)  Application services only. PostgreSQL, Redis, S3 are external.
#   - local      Also include PostgreSQL, Redis, and MinIO containers.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d                  # managed DB
#   docker compose -f docker-compose.prod.yml --profile local up -d  # all-in-one
# =============================================================================

# -- Shared environment for all backend services -----------------------------
x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost}
  SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
  DATABASE_URL: ${DATABASE_URL:-postgres://showdesk:showdesk@postgres:5432/showdesk}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-showdesk-media}
  S3_REGION: ${S3_REGION:-us-east-1}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost}
  SITE_URL: ${SITE_URL:-https://localhost}
  EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
  EMAIL_HOST: ${EMAIL_HOST:-smtp.example.com}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@showdesk.io}
  LIVEKIT_URL: ${LIVEKIT_URL:-}
  LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
  LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}

configs:
  caddyfile:
    content: |
      ${SHOWDESK_DOMAIN:-localhost} {
        header {
          X-Content-Type-Options nosniff
          X-Frame-Options DENY
          Referrer-Policy strict-origin-when-cross-origin
          Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
          -Server
        }

        handle /api/* {
          reverse_proxy backend:8000
        }

        handle /admin/* {
          reverse_proxy backend:8000
        }

        handle /static/* {
          reverse_proxy backend:8000
        }

        handle /ws/* {
          reverse_proxy backend:8000
        }

        handle {
          reverse_proxy frontend:80
        }
      }

services:
  # ---------------------------------------------------------------------------
  # Caddy (reverse proxy — automatic HTTPS via Let's Encrypt)
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    ports:
      - "${EXTERNAL_IP:-0.0.0.0}:80:80"
      - "${EXTERNAL_IP:-0.0.0.0}:443:443"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Database Migrations (one-shot, runs before app services)
  # ---------------------------------------------------------------------------
  migrate:
    image: ghcr.io/showdesk-io/showdesk-backend:latest
    command: migrate
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
    depends_on:
      redis:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false

  # ---------------------------------------------------------------------------
  # Django Backend (Gunicorn + Uvicorn for WebSockets)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/showdesk-io/showdesk-backend:latest
    command: server
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    image: ghcr.io/showdesk-io/showdesk-backend:latest
    command: worker
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-4}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery Beat (scheduler)
  # ---------------------------------------------------------------------------
  celery-beat:
    image: ghcr.io/showdesk-io/showdesk-backend:latest
    command: beat
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "false"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React Frontend (Nginx serving static build)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/showdesk-io/showdesk-frontend:latest
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis (profile: local)
  # When using managed Redis, set REDIS_URL / CELERY_BROKER_URL.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    profiles: [local]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL (profile: local)
  # When using managed PostgreSQL, set DATABASE_URL.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    profiles: [local]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-showdesk}
      POSTGRES_USER: ${POSTGRES_USER:-showdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-showdesk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-showdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO S3 (profile: local)
  # When using managed S3, set S3_* vars.
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio
    profiles: [local]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-showdesk}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-showdesk-secret}
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  postgres_data:
  minio_data:
